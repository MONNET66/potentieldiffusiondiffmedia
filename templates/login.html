<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        /* LOGO */
        .logo {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo img {
            max-width: 340px;
            height: auto;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .error {
            margin-top: 14px;
            color: #b91c1c;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
        }

        .hint {
            margin-top: 14px;
            color: #666;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="box">

        <!-- LOGO -->
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        </div>

        <h1>Connexion</h1>

        <form method="post">
            <label for="username">Identifiant</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Se connecter</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="hint">
            Accès réservé aux utilisateurs autorisés
        </div>

    </div>
</body>
</html>
